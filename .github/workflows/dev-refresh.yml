name: dev-refresh

on:
  push:
    branches:
      - dev

# Coalesce rapid pushes: only the latest dev refresh matters.
concurrency:
  group: dev-refresh-front-nuc
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  refresh:
    runs-on: [self-hosted, marz-builder]
    timeout-minutes: 10

    # Operate on the canonical NUC front tree, NOT a fresh _work checkout:
    # this tree IS the local reference we keep in sync with branch `dev`.
    # Front deploys to Vercel on its own, so there is no build/deploy here —
    # this job only fast-forwards the working copy (the equivalent of git pull).
    defaults:
      run:
        working-directory: /home/rafita/proyectos/marz/front

    steps:
      - name: Fast-forward dev tree
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin dev
          git checkout dev
          # --ff-only: never clobber local WIP — fail loudly instead.
          git merge --ff-only origin/dev
